version: '3.9'

services:
  # ─── PostgreSQL 15 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: keycebet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       keycebet
      POSTGRES_USER:     keycebet
      POSTGRES_PASSWORD: keycebet_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycebet -d keycebet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: keycebet-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Backend Spring Boot ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keycebet-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PROFILE:                dev
      DB_URL:                 jdbc:postgresql://postgres:5432/keycebet
      DB_USERNAME:            keycebet
      DB_PASSWORD:            keycebet_secret
      REDIS_HOST:             redis
      REDIS_PORT:             6379
      JWT_SECRET:             ${JWT_SECRET:-change_me_in_production_at_least_256_bits_long_key}
      JWT_EXPIRATION:         ${JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      ADMIN_EMAIL:            ${ADMIN_EMAIL:-mbargaernest80@gmail.com}
      ADMIN_PASSWORD:         ${ADMIN_PASSWORD:-Nash_2006}
      PAYMENT_API_KEY:        ${PAYMENT_API_KEY:-}
      PAYMENT_API_URL:        ${PAYMENT_API_URL:-}
      SPORTS_API_KEY:         ${SPORTS_API_KEY:-}
      SPORTS_API_URL:         ${SPORTS_API_URL:-}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
