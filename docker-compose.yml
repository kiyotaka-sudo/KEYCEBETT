version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: keycebet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycebet
      POSTGRES_USER: keycebet
      POSTGRES_PASSWORD: keycebet_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keycebet -d keycebet']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: keycebet-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: keycebet-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PROFILE: dev
      DB_URL: jdbc:postgresql://postgres:5432/keycebet
      DB_USERNAME: keycebet
      DB_PASSWORD: keycebet_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/api/actuator/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  postgres_data:
  redis_data:
